name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      include_offline_resources:
        description: '包含离线资源（需要预先上传到仓库）'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 检查离线资源
        id: check_resources
        shell: pwsh
        run: |
          $offlineGuiExists = Test-Path "resources/codex-gui.*"
          $offlineCliExists = (Test-Path "resources/codex-cli/install.sh") -and (Test-Path "resources/codex-cli/codex-linux-x64.tar.gz")

          if ($offlineGuiExists -and $offlineCliExists) {
            echo "HAS_OFFLINE=true" >> $env:GITHUB_OUTPUT
            echo "VERSION=完全离线版" >> $env:GITHUB_OUTPUT
          } else {
            echo "HAS_OFFLINE=false" >> $env:GITHUB_OUTPUT
            echo "VERSION=轻量版" >> $env:GITHUB_OUTPUT
          }

      - name: 安装依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pyinstaller pywebview

      - name: 打包 exe
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm TinaCodexAssistant.spec

      - name: 获取文件信息
        id: file_info
        shell: pwsh
        run: |
          $exePath = "dist/Tina-codex助手.exe"
          $exeSize = [math]::Round((Get-Item $exePath).Length / 1MB, 2)
          echo "EXE_SIZE=$exeSize MB" >> $env:GITHUB_OUTPUT

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Tina-codex助手-${{ steps.check_resources.outputs.VERSION }}
          path: dist/Tina-codex助手.exe

      - name: 创建 Release（如果是 tag）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Tina-codex助手.exe
          body: |
            ## Tina-codex 助手 ${{ github.ref_name }}

            **版本类型**: ${{ steps.check_resources.outputs.VERSION }}
            **文件大小**: ${{ steps.file_info.outputs.EXE_SIZE }}

            ### 功能
            - ✅ 一键安装 Codex GUI 和 CLI
            - ✅ 自动注入中文插件市场
            - ✅ 智能检测和备份现有配置

            ${{ steps.check_resources.outputs.HAS_OFFLINE == 'true' && '### 完全离线版\n- ✅ 包含所有离线资源\n- ✅ 无需 VPN 即可安装\n- ✅ 适合国内用户' || '### 轻量版\n- ⚠️ 需要网络访问\n- ⚠️ Codex GUI/CLI 安装需要 VPN\n- ✅ 文件体积小' }}

            ### 使用说明
            详见 [WINDOWS_USAGE.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/WINDOWS_USAGE.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
