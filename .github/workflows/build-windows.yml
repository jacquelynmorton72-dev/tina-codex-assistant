name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pyinstaller pywebview pytest

      - name: 运行测试
        shell: pwsh
        run: |
          python -m pytest tests/ -q

      - name: 打包 exe
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm TinaCodexAssistant.spec

      - name: 获取文件信息
        id: file_info
        shell: pwsh
        run: |
          $exePath = "dist/Tina-codex助手.exe"
          $exeSize = [math]::Round((Get-Item $exePath).Length / 1MB, 2)
          echo "EXE_SIZE=$exeSize MB" >> $env:GITHUB_OUTPUT

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Tina-codex助手
          path: dist/Tina-codex助手.exe

      - name: 创建 Release（如果是 tag）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Tina-codex助手.exe
          body: |
            ## Tina-codex 助手 ${{ github.ref_name }}

            **文件大小**: ${{ steps.file_info.outputs.EXE_SIZE }}

            ### 功能
            - ✅ 一键安装 Codex GUI（微软商店离线包，国内可直连）
            - ✅ 一键安装 Codex CLI（npm 原生方案，Node/npm 走 npmmirror 国内镜像）
            - ✅ 自动安装 Git（npmmirror 国内镜像）
            - ✅ 注入 Tina-codex 中文插件市场
            - ✅ 检测并备份现有配置，不写入任何模型服务配置

            ### 使用说明
            详见 [WINDOWS_USAGE.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/WINDOWS_USAGE.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
